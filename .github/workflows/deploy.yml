name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

env:
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/xa-lms-api
  WEB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/xa-lms-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            cd /opt/xa-lms
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Notify WhatsApp - success
        if: success()
        run: |
          curl -s -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ secrets.WHATSAPP_PHONE }}" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_API_KEY }}" \
            --data-urlencode "text=✅ XA-LMS deploy SUCCEEDED — commit ${{ github.sha }} by ${{ github.actor }}"

      - name: Notify WhatsApp - failure
        if: failure()
        run: |
          curl -s -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${{ secrets.WHATSAPP_PHONE }}" \
            --data-urlencode "apikey=${{ secrets.CALLMEBOT_API_KEY }}" \
            --data-urlencode "text=❌ XA-LMS deploy FAILED — commit ${{ github.sha }} by ${{ github.actor }}. Check GitHub Actions logs."
